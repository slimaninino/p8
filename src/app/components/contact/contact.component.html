<form
  class="contact-form"
  [formGroup]="form"
  [action]="googleFormAction"
  method="POST"
  target="hidden_iframe"
  (ngSubmit)="onSubmit()"
>
  <div class="field">
    <label for="name">Name *</label>
    <input id="name" type="text" formControlName="name" name="entry.2005620554">
    <small *ngIf="form.get('name')?.touched && form.get('name')?.invalid">Name is required.</small>
  </div>

  <div class="field">
    <label for="email">Email *</label>
    <input id="email" type="email" formControlName="email" name="entry.1045781291">
    <small *ngIf="form.get('email')?.touched && form.get('email')?.invalid">Enter a valid email.</small>
  </div>

  <div class="field">
    <label for="address">Address *</label>
    <textarea id="address" rows="4" formControlName="address" name="entry.1065046570"></textarea>
    <small *ngIf="form.get('address')?.touched && form.get('address')?.invalid">Address is required.</small>
  </div>

  <div class="field">
    <label for="phone">Phone number</label>
    <input id="phone" type="tel" formControlName="phone" name="entry.1166974658">
  </div>

  <div class="field">
    <label for="comments">Comments</label>
    <textarea id="comments" rows="5" formControlName="comments" name="entry.839337160"></textarea>
  </div>

  <button type="submit" [disabled]="sending">
    {{ sending ? 'Sending...' : 'Send' }}
  </button>

  <p class="success" *ngIf="submitted">Message sent successfully.</p>
</form>

<iframe name="hidden_iframe" style="display:none;"></iframe>
